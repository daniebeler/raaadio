<ion-grid *ngIf="controls?.station">
  <ion-row>
    <ion-col size="auto">
      <img class="station-icon" [src]="controls?.station?.icon" alt="" />
    </ion-col>
    <ion-col size="auto">
      {{ controls?.station?.name }}
    </ion-col>
    <ion-col>
      <button *ngIf="controls?.playing" (click)="pause()">
        Stop
      </button>

      <button *ngIf="!controls?.playing" (click)="play()">
        Play
      </button>
    </ion-col>
  </ion-row>
</ion-grid>
