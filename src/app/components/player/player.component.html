<ion-grid>
  <ion-row>
    <ion-col size="auto">
      <img class="station-icon" [src]="currentPlayingStation?.icon" alt="">
    </ion-col>
    <ion-col size="auto">
      {{ currentPlayingStation?.name }}
    </ion-col>
    <ion-col>
      <audio controls autoplay>
        <source [src]="currentPlayingStation?.url" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
    </ion-col>
  </ion-row>
</ion-grid>
