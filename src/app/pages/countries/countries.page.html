<ion-header>
  <ion-toolbar>
    <ion-title>countries</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-grid>
          <ion-row class="country-row" *ngFor="let country of countries" (click)="gotoCountry(country.code)">
            <ion-col>
              <p>{{country.name}}</p>
              </ion-col>
          </ion-row>
        </ion-grid>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
