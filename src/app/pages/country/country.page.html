<ion-header>
  <ion-toolbar>
    <ion-title>{{countryName}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-grid>
          <ion-row *ngFor="let station of stations">
            <ion-col>
              <app-station [station]="station"/>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
